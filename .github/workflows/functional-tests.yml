name: Functional Tests

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  check-authorization:
    name: Check Authorization
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Check if user is authorized
        id: check
        run: |
          AUTHORIZED=false
          if [[ "${{ github.event_name }}" == "push" ]]; then
            AUTHORIZED=true
          elif [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            if [[ "${{ github.event.pull_request.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "issue_comment" && "${{ github.event.issue.pull_request }}" != "" ]]; then
            if [[ "${{ github.event.comment.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]] && [[ "${{ github.event.comment.body }}" =~ ^/(test-functional|retest) ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AUTHORIZED=true
          fi
          echo "authorized=$AUTHORIZED" >> $GITHUB_OUTPUT

  tf-functional-tests:
    name: Functional Tests (Testing Farm)
    needs: check-authorization
    if: needs.check-authorization.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    container:
      image: quay.io/testing-farm/cli
    env:
      ARCH: x86_64
      COMPOSE: Fedora-43
      PLAN: general
      TESTING_FARM_API_TOKEN: ${{ secrets.TESTING_FARM_API_TOKEN }}

    steps:
      - name: Run TF request tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting functional tests..."

          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            GIT_URL="${{ github.event.pull_request.head.repo.clone_url }}"
            GIT_REF="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            export PR_API_URL="https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}"

            PR_DATA=$(python3 -c "import urllib.request, json, os; req = urllib.request.Request(os.environ['PR_API_URL'], headers={'Authorization': 'Bearer ' + os.environ['GITHUB_TOKEN']}); print(json.dumps(json.loads(urllib.request.urlopen(req).read().decode('utf-8'))))")

            GIT_URL=$(echo "$PR_DATA" | python3 -c "import sys, json; print(json.load(sys.stdin)['head']['repo']['clone_url'])")
            GIT_REF=$(echo "$PR_DATA" | python3 -c "import sys, json; print(json.load(sys.stdin)['head']['sha'])")
          else
            GIT_URL="https://github.com/${{ github.repository }}"
            GIT_REF="${{ github.sha }}"
          fi

          export GIT_REF

          update_status() {
            if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
              local state=$1
              local description=$2
              python3 -c "
import urllib.request, json, os
req = urllib.request.Request(
    f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/statuses/{os.environ[\"GIT_REF\"]}',
    data=json.dumps({
        'state': '$state',
        'target_url': f'{os.environ.get(\"GITHUB_SERVER_URL\", \"https://github.com\")}/{os.environ[\"GITHUB_REPOSITORY\"]}/actions/runs/{os.environ[\"GITHUB_RUN_ID\"]}',
        'description': '$description',
        'context': 'Functional Tests (Testing Farm)'
    }).encode('utf-8'),
    headers={
        'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}',
        'Content-Type': 'application/json'
    },
    method='POST'
)
try:
    urllib.request.urlopen(req)
except Exception as e:
    print(f'Warning: Failed to update commit status: {e}')
"
            fi
          }

          update_status "pending" "Testing Farm tests are running"

          if TESTING_FARM_API_TOKEN=$TESTING_FARM_API_TOKEN testing-farm request \
            --git-url "$GIT_URL" \
            --git-ref "$GIT_REF" \
            --arch "$ARCH" \
            --compose "$COMPOSE" \
            --tag BusinessUnit=rhel_sst_lightspeed@downstream \
            --plan "$PLAN" \
            --timeout 120; then
            update_status "success" "Testing Farm tests passed"
            echo "Functional tests finished successfully!"
          else
            update_status "failure" "Testing Farm tests failed"
            echo "Functional tests failed!"
            exit 1
          fi
