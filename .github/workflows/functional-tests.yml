name: Functional Tests

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-authorization:
    name: Check Authorization
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Check if user is authorized
        id: check
        run: |
          AUTHORIZED=false
          if [[ "${{ github.event_name }}" == "push" ]]; then
            AUTHORIZED=true
          elif [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            if [[ "${{ github.event.pull_request.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "issue_comment" && "${{ github.event.issue.pull_request }}" != "" ]]; then
            if [[ "${{ github.event.comment.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]] && [[ "${{ github.event.comment.body }}" =~ ^/(test-functional|retest) ]]; then
              AUTHORIZED=true
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AUTHORIZED=true
          fi
          echo "authorized=$AUTHORIZED" >> $GITHUB_OUTPUT

  tf-functional-tests:
    name: Functional Tests (Testing Farm)
    needs: check-authorization
    if: needs.check-authorization.outputs.authorized == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Determine PR Coordinates
        id: prep
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let gitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            let gitRef = context.sha;

            let prNumber;
            if (context.eventName === 'pull_request_target') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.issue.number;
            }

            if (prNumber) {
              const maxRetries = 5;
              const delayMs = 30000; // 30 seconds
              const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

              for (let i = 0; i < maxRetries; i++) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                if (pr.mergeable === true) {
                  core.info(`\u2705 PR is mergeable. Merge commit SHA: ${pr.merge_commit_sha}`);
                  gitRef = pr.merge_commit_sha;
                  break;
                } else if (pr.mergeable === false) {
                  core.setFailed(`\u274c PR #${prNumber} has merge conflicts. Cannot proceed.`);
                  return;
                } else if (pr.mergeable === null) {
                  core.info(`\u23f3 GitHub is computing mergeability (status: null). Retrying in ${delayMs / 1000} seconds... (${i + 1}/${maxRetries})`);
                  if (i === maxRetries - 1) {
                    core.setFailed(`\U0001f6a8 Timeout: GitHub did not finish computing mergeability after ${maxRetries} attempts.`);
                    return;
                  }
                  await sleep(delayMs);
                }
              }
            }

            core.exportVariable('GIT_URL', gitUrl);
            core.exportVariable('GIT_REF', gitRef);
      - name: Schedule test on Testing Farm
        id: tf-request
        uses: sclorg/testing-farm-as-github-action@270f0d1d89dad513588fb5cc2cdd512c3459f3fe # v3
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          git_url: ${{ env.GIT_URL }}
          git_ref: ${{ env.GIT_REF }}
          arch: x86_64
          compose: Fedora-43
          tmt_plan_regex: general
          environment_settings: '{"provision": {"tags": {"BusinessUnit": "rhel_sst_lightspeed@downstream"}}}'
          update_pull_request_status: true

      - name: Download xUnit results
        if: always()
        run: |
          REQUEST_URL="${{ steps.tf-request.outputs.request_url }}"
          if [[ -n "$REQUEST_URL" ]]; then
            echo "Downloading xUnit results from $REQUEST_URL/results.xml"
            # -f ensures curl fails on 404/500 errors.
            if curl -sSLf -o results.xml "$REQUEST_URL/results.xml"; then
              # Validate it's actually an XML file (not a generic HTML error page)
              if head -n 1 results.xml | grep -q '<?xml'; then
                echo "Successfully downloaded and validated results.xml"
              else
                echo "results.xml downloaded but appears corrupted or is not XML."
                rm -f results.xml
              fi
            else
              echo "Failed to download results.xml (File may not exist if tests crashed early)."
            fi
          else
            echo "No request URL output found from Testing Farm."
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-test-results
          path: results.xml
          retention-days: 14
